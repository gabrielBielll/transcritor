<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transcritor IA</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <style>
    :root { --bg:#0f172a; --card:#1e293b; --accent:#38bdf8; --txt:#e2e8f0; --muted:#94a3b8; }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg); color: var(--txt); min-height: 100vh;
    }
    #app { max-width: 720px; margin: 0 auto; padding: 24px 16px 64px; }
    h1 { font-size: 1.5rem; margin: 8px 0 4px; }
    p.sub { color: var(--muted); margin: 0 0 24px; }
    .card { background: var(--card); border-radius: 14px; padding: 20px; margin-bottom: 16px; }
    label { display: block; font-size: .85rem; color: var(--muted); margin-bottom: 6px; }
    input[type="text"], input[type="email"] {
      width: 100%; padding: 11px 12px; border-radius: 9px; border: 1px solid #334155;
      background: #0b1220; color: var(--txt); font-size: .95rem;
    }
    input[type="file"] { width: 100%; color: var(--muted); }
    .row { margin-bottom: 14px; }
    .check { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: .9rem; }
    .check input { width: auto; }
    button {
      width: 100%; padding: 13px; border: none; border-radius: 10px; cursor: pointer;
      background: var(--accent); color: #082f49; font-weight: 700; font-size: 1rem;
    }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .secondary { background: #334155; color: var(--txt); margin-top: 8px; }
    .status { padding: 12px; border-radius: 9px; margin-top: 14px; font-size: .9rem; }
    .status.info { background: #0c4a6e; }
    .status.err  { background: #7f1d1d; }
    .status.ok   { background: #14532d; }
    .resultado { white-space: pre-wrap; line-height: 1.6; font-size: .95rem; }
    .seg { display: flex; gap: 10px; padding: 6px 0; border-bottom: 1px solid #293548; }
    .seg .t { color: var(--accent); font-variant-numeric: tabular-nums; flex: 0 0 64px; font-size: .8rem; padding-top: 2px; }
    .actions { display: flex; gap: 8px; margin-top: 14px; }
    .actions button { width: auto; flex: 1; }
    .spinner { display:inline-block; width:14px; height:14px; border:2px solid #fff; border-top-color:transparent; border-radius:50%; animation:spin .7s linear infinite; vertical-align:-2px; margin-right:8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="app">
    <h1>🎙️ Transcritor IA</h1>
    <p class="sub">Transcrição de qualidade (Whisper large-v3) — sempre online, sem abrir o Colab.</p>

    <div class="card">
      <div class="row">
        <label>URL do backend (cole a do seu Northflank e fica salvo)</label>
        <input type="text" v-model="urlBackend" placeholder="https://seu-app.northflank.app" />
      </div>

      <div class="row">
        <label>Arquivo de áudio</label>
        <input type="file" accept="audio/*,video/*" @change="aoEscolher" />
      </div>

      <div class="row">
        <label>E-mail (opcional — recebe o resultado anexado)</label>
        <input type="email" v-model="email" placeholder="deixe vazio para ver aqui na hora" />
      </div>

      <div class="row check">
        <input type="checkbox" id="bg" v-model="modoBackground" :disabled="!email" />
        <label for="bg" style="margin:0;">Arquivo grande? Processar em segundo plano e avisar por e-mail (precisa de e-mail)</label>
      </div>

      <button :disabled="!podeEnviar || carregando" @click="transcrever">
        <span v-if="carregando" class="spinner"></span>
        {{ carregando ? 'Transcrevendo...' : 'Transcrever' }}
      </button>

      <div v-if="mensagem" :class="['status', tipoMsg]">{{ mensagem }}</div>
    </div>

    <div class="card" v-if="segmentos.length">
      <div class="actions">
        <button class="secondary" @click="copiar">📋 Copiar texto</button>
        <button class="secondary" @click="baixar">⬇️ Baixar .txt</button>
      </div>
      <h3 style="margin:18px 0 8px;">Texto completo</h3>
      <div class="resultado">{{ textoCompleto }}</div>
      <h3 style="margin:22px 0 8px;">Por trecho</h3>
      <div class="seg" v-for="(s, i) in segmentos" :key="i">
        <span class="t">{{ formatTempo(s.start) }}</span>
        <span>{{ s.text }}</span>
      </div>
    </div>
  </div>

  <script>
    const { createApp, ref, computed } = Vue;
    createApp({
      setup() {
        const urlBackend = ref(localStorage.getItem('urlBackend') || '');
        const email = ref('');
        const modoBackground = ref(false);
        const arquivo = ref(null);
        const carregando = ref(false);
        const mensagem = ref('');
        const tipoMsg = ref('info');
        const segmentos = ref([]);
        const textoCompleto = ref('');

        const podeEnviar = computed(() => urlBackend.value.trim() && arquivo.value);

        function aoEscolher(e) { arquivo.value = e.target.files[0] || null; }

        function formatTempo(seg) {
          const m = Math.floor(seg / 60), s = Math.floor(seg % 60);
          return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        async function transcrever() {
          if (!podeEnviar.value) return;
          if (modoBackground.value && !email.value) {
            tipoMsg.value = 'err'; mensagem.value = 'O modo segundo plano precisa de um e-mail.'; return;
          }

          // Salva a URL pra não precisar colar de novo
          const base = urlBackend.value.trim().replace(/\/$/, '');
          localStorage.setItem('urlBackend', base);

          carregando.value = true;
          segmentos.value = []; textoCompleto.value = '';
          tipoMsg.value = 'info'; mensagem.value = 'Enviando e processando...';

          try {
            const form = new FormData();
            form.append('file', arquivo.value);
            if (email.value) form.append('email', email.value);

            const url = `${base}/transcrever${modoBackground.value ? '?run_async=true' : ''}`;
            const resp = await fetch(url, { method: 'POST', body: form });
            const dados = await resp.json();
            if (!resp.ok) throw new Error(dados.detail || 'Erro no servidor');

            if (dados.status === 'async_started') {
              tipoMsg.value = 'ok';
              mensagem.value = '✅ Despachado! O resultado vai chegar no seu e-mail.';
            } else {
              segmentos.value = dados.segmentos || [];
              textoCompleto.value = dados.texto || '';
              tipoMsg.value = 'ok';
              mensagem.value = `✅ Pronto! ${segmentos.value.length} trechos transcritos.`;
            }
          } catch (e) {
            tipoMsg.value = 'err';
            mensagem.value = '❌ ' + e.message;
          } finally {
            carregando.value = false;
          }
        }

        function copiar() { navigator.clipboard.writeText(textoCompleto.value); mensagem.value = '📋 Copiado!'; tipoMsg.value = 'ok'; }
        function baixar() {
          const blob = new Blob([textoCompleto.value], { type: 'text/plain' });
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = 'transcricao.txt';
          a.click();
        }

        return { urlBackend, email, modoBackground, arquivo, carregando, mensagem, tipoMsg,
                 segmentos, textoCompleto, podeEnviar, aoEscolher, formatTempo, transcrever, copiar, baixar };
      }
    }).mount('#app');
  </script>
</body>
</html>
